<!doctype html>
<html class="no-js" lang="fr">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Saikou — Environnements de Développement</title>
    <link rel="shortcut icon" type="image/icon" href="assets/logo/favicon.png"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/animate.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>

<a href="javascript:history.back()" class="btn btn-primary btn-back">
    <i class="fa fa-arrow-left"></i> Retour
</a>

<style>
    .btn-back {
        position: absolute; top: 20px; left: 20px;
        font-size: 16px; padding: 10px 20px; border-radius: 30px;
        transition: background-color 0.3s ease, box-shadow 0.3s ease;
    }
    .btn-back:hover { background-color: #0056b3; box-shadow: 0px 4px 8px rgba(0,0,0,0.1); }
    .btn-back i { margin-right: 8px; }
    .single-skill-content { margin-bottom: 30px; }
    .profile-icon-name { font-size: 14px; margin-top: 10px; font-weight: 600; }
    .skills-row { display: flex; justify-content: center; flex-wrap: wrap; gap: 40px; margin-top: 20px; }
</style>

<section id="skills" class="skills">
    <div class="skill-content">
        <div class="section-heading text-center">
            <h2>Environnements de Développement</h2>
        </div>
        <div class="container">
            <div class="skills-row">
                <div class="text-center">
                    <div class="single-skill-content">
                        <img src="assets/logo/vscode-logo.jpeg" alt="VS Code" style="width: 50px; height: 50px; object-fit: contain;">
                        <div class="profile-icon-name">VS Code</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<script src="assets/js/jquery.js"></script>
<script src="assets/js/bootstrap.min.js"></script>
<script src="assets/js/custom.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
</body>
</html>
